# AI Scraper Config: Bay State Pet (Own Site)
# Migrated from legacy static scraper to Crawl4AI
name: "ai-baystatepet"
display_name: "AI Bay State Pet Extractor"
base_url: "https://www.baystatepet.com"
scraper_type: "agentic"

ai_config:
  provider: "crawl4ai"
  task: "Extract product information from Bay State Pet & Garden Supply website including product name, SKU, description, images, and category breadcrumbs."
  max_steps: 10
  confidence_threshold: 0.7
  llm_model: "gpt-4o-mini"
  use_vision: true
  headless: true

workflows:
  - action: "navigate"
    name: "navigate_to_product_or_search"
    params:
      url: "https://www.baystatepet.com/catalogsearch/result/?q={sku}"

  - action: "ai_extract"
    name: "extract_baystatepet_product"
    params:
      task: "Find and extract Bay State Pet product information including Name, SKU, Description, Images, and Breadcrumbs/Category. Handle product pages or search results."
      visit_top_n: 2
      max_steps: 12
      confidence_threshold: 0.7
      schema:
        name: str
        sku: str
        description: str
        images: list
        breadcrumbs: list
        price: str

  - action: "ai_validate"
    name: "validate_baystatepet_extraction"
    params:
      required_fields:
        - name
        - sku
        - images
      sku_must_match: true
      min_confidence: 0.65

test_skus:
  - "dog food"
  - "cat food"
  - "pet toy"

fake_skus:
  - "xyzabc123notexist456"
  - "NOTAPRODUCT"

edge_case_skus:
  - "a"
  - "12"

timeout: 60
retries: 0

anti_detection:
  enable_captcha_detection: false
  enable_rate_limiting: true
  enable_human_simulation: true
  enable_session_rotation: false
  enable_blocking_handling: false
  rate_limit_min_delay: 1.0
  rate_limit_max_delay: 3.0
  session_rotation_interval: 50
  max_retries_on_detection: 2

validation:
  no_results_selectors:
    - ".no-products"
    - ".no-results"
  no_results_text_patterns:
    - "no products found"
    - "0 results"
