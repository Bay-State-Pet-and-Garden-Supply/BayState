schema_version: "1.0"
name: central-pet
display_name: Central Pet
base_url: https://www.centralpet.com
scraper_type: static
use_stealth: false
selectors:
  - name: Name
    selector: "#tst_productDetail_erpDescription, h1"
    attribute: text
    multiple: false
    required: true
  - name: Brand
    selector: a[ng-if='vm.product.brand.detailPagePath']
    attribute: text
    multiple: false
    required: true
  - name: Weight
    selector: //div[@class='specification-container']//li[strong[contains(text(),
      'Product Gross Weight')]]/span
    attribute: innerHTML
    multiple: false
    required: false
  - name: Image URLs
    selector: a#tst_productDetail_imageZoom img
    attribute: src
    multiple: true
    required: true
  - name: "Product #"
    selector: span[itemprop='sku'], .item-num span
    attribute: text
    multiple: false
    required: false
  - name: UPC
    selector: .upc span
    attribute: text
    multiple: false
    required: false
  - name: "Mfg Part #"
    selector: .mfg-part-num span
    attribute: text
    multiple: false
    required: false
  - name: Description
    selector: "#tst_productDetail_htmlContent"
    attribute: text
    multiple: false
    required: false
  - name: Specifications
    selector: "#tst_productDetail_specifications li"
    attribute: text
    multiple: true
    required: false
  - name: Features
    selector: "#tst_productDetail_features li, .product-features li"
    attribute: text
    multiple: true
    required: false
  - name: Dimensions
    selector: "//div[@class='specification-container']//li[strong[contains(text(), 'Dimension')]]/span"
    attribute: innerHTML
    multiple: false
    required: false
  - name: Safety Info
    selector: .safety-info
    attribute: text
    multiple: false
    required: false
workflows:
  - action: navigate
    name: null
    params:
      url: "{base_url}/Search?criteria={sku}"
  - action: conditional_click
    name: null
    params:
      selector: //button[contains(text(), 'Accept')]
  - action: wait
    name: null
    params:
      seconds: 2
  - action: wait_for
    name: null
    params:
      timeout: 30
      selector:
        - "#tst_productDetail_erpDescription"
        - "span.no-results-found"
        - ".no-results"
        - "//h1[contains(text(), 'RESULTS FOUND FOR')]"
        - "//div[contains(text(), \"We're sorry, your search returned no results.\")]"
  - action: check_no_results
    name: null
    params: {}
  - action: conditional_skip
    name: Skip if no results
    params:
      if_flag: no_results_found
  - action: conditional
    name: Skip validation if on PDP
    params:
      condition_type: element_exists
      selector: "#tst_productDetail_erpDescription"
      else:
        - action: validate_search_result
          name: null
          params:
            required_selectors:
              - "#tst_productDetail_erpDescription"
              - "h1"
              - "[data-product-detail]"
        - action: conditional_skip
          name: null
          params:
            if_flag: no_results_found
  - action: wait_for
    name: Wait for product detail
    params:
      timeout: 10
      selector:
        - "#tst_productDetail_erpDescription"
  - action: extract
    name: null
    params:
      fields:
        - Name
        - Brand
        - Weight
        - Image URLs
        - "Product #"
        - UPC
        - "Mfg Part #"
        - Description
        - Specifications
        - Features
        - Dimensions
  - action: process_images
    name: null
    params:
      field: Image URLs
      quality_patterns:
        - regex: "/w_\\d+/"
          replacement: "/w_1500/"
        - regex: "/h_\\d+/"
          replacement: "/h_1500/"
      filters:
        - type: exclude_text
          text: placeholder
        - type: exclude_text
          text: noimage
      deduplicate: true
ai_config: null
anti_detection:
  enable_rate_limiting: false
  rate_limit_max_delay: 3
  rate_limit_min_delay: 1
  enable_human_simulation: false
  enable_session_rotation: false
  enable_blocking_handling: false
  enable_captcha_detection: false
  max_retries_on_detection: 3
  session_rotation_interval: 100
validation:
  no_results_selectors:
    - //h2[contains(text(), 'No results found')]
    - //h2[contains(text(), 'No results found for')]
    - span.no-results-found
    - .no-results
    - .empty-search
    - "[data-testid*='no-results']"
    - div.search-results-none
    - "p:contains('Sorry, no products were found')"
    - "h2:contains('No Search Results')"
    - "h2:contains('No results found for')"
    - "div:contains(\"We're sorry, your search returned no results.\")"
    - "div:contains(\"We're sorry, there were no products found.\")"
  no_results_text_patterns:
    - no results found
    - no products found
    - your search returned no results
    - we couldn't find any results
    - no items match your search
    - sorry, no products were found
    - no search results
    - "We're sorry, your search returned no results."
    - "We're sorry, there were no products found."
login: null
http_status:
  enabled: true
  error_status_codes:
    - 400
    - 401
    - 403
    - 404
    - 500
    - 502
    - 503
    - 504
  fail_on_error_status: true
  warning_status_codes:
    - 301
    - 302
    - 307
    - 308
normalization: null
timeout: 30
retries: 2
image_quality: 60
credential_refs:
  - central-pet
test_skus:
  - "38777520"
  - "43580233"
  - "55599200"
  - "32530920"
  - "74200017"
  - "32530120"
fake_skus:
  - xyzabc123notexist456
  - "00000000"
  - "99999999"
edge_case_skus:
  - "1"
  - "123456789012345"
