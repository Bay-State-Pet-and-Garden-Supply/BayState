name: "mazuri"
display_name: "Crawl4AI Mazuri Product Extractor"
base_url: "https://www.mazuri.com"
scraper_type: "static"
schema_version: "1.0"

selectors:
  - name: "name"
    selector: "h1.product__title"
    attribute: "text"
    required: true

  - name: "brand"
    selector: ".product__vendor"
    attribute: "text"
    required: false

  - name: "description"
    selector: ".product__description"
    attribute: "text"
    required: false

  - name: "images"
    selector: ".product__media img"
    attribute: "src"
    multiple: true
    required: false

  - name: "weight"
    selector: ".product__description"
    attribute: "text"
    required: false

  - name: "ingredients"
    selector: ".product__description"
    attribute: "text"
    required: false

  - name: "guaranteed_analysis"
    selector: ".product__description"
    attribute: "text"
    required: false

  - name: "feeding_directions"
    selector: ".product__description"
    attribute: "text"
    required: false

  - name: "size_options"
    selector: ".product-form__input option, .product-form__input label"
    attribute: "text"
    multiple: true
    required: false

workflows:
  - action: "navigate"
    name: "open_mazuri_search"
    params:
      url: "{base_url}/pages/search-results-page?q={sku}"

  - action: "wait_for"
    name: "wait_for_search_results"
    params:
      selector:
        - "a[href*='/products/']"
        - "main"
      timeout: 20

  - action: "click"
    name: "open_first_product_result"
    params:
      selector: "a[href*='/products/']"
      index: 0
      wait_after: 1.5

  - action: "wait_for"
    name: "wait_for_product_title"
    params:
      selector:
        - "h1.product__title"
        - "h1"
      timeout: 20

  - action: "extract"
    name: "extract_mazuri_fields"
    params:
      fields:
        - "name"
        - "brand"
        - "description"
        - "images"
        - "weight"
        - "ingredients"
        - "guaranteed_analysis"
        - "feeding_directions"
        - "size_options"

  - action: "check_no_results"
    name: "check_for_no_results"

test_skus:
  - "5E5L"
  - "5M30"
  - "5M3N"

fake_skus:
  - "xyzabc123notexist456"
  - "9999999"
  - "NOTEXIST"

edge_case_skus:
  - "1"
  - "00000000000"

timeout: 60
retries: 0

anti_detection:
  enable_captcha_detection: false
  enable_rate_limiting: true
  enable_human_simulation: true
  enable_session_rotation: false
  enable_blocking_handling: false
  rate_limit_min_delay: 2.0
  rate_limit_max_delay: 4.0
  session_rotation_interval: 30
  max_retries_on_detection: 2

validation:
  no_results_selectors:
    - ".snize-no-products-found"
    - ".no-results"
    - ".empty-search"
  no_results_text_patterns:
    - "no results found"
    - "no products found"
    - "your search returned no results"
