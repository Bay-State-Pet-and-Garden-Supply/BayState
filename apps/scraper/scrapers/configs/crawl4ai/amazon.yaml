name: "amazon"
display_name: "Crawl4AI Amazon Product Extractor"
base_url: "https://www.amazon.com"
scraper_type: "static"
schema_version: "1.0"

selectors:
  - name: "name"
    selector: "#productTitle"
    attribute: "text"
    required: true

  - name: "brand"
    selector: "#bylineInfo"
    attribute: "text"
    required: false

  - name: "price"
    selector: ".a-price .a-offscreen"
    attribute: "text"
    required: false

  - name: "description"
    selector: "#feature-bullets"
    attribute: "text"
    required: false

  - name: "images"
    selector: "#altImages img"
    attribute: "src"
    multiple: true
    required: false

  - name: "availability"
    selector: "#availability"
    attribute: "text"
    required: false

  - name: "asin"
    selector: "#ASIN"
    attribute: "value"
    required: false

  - name: "weight"
    selector: "#detailBullets_feature_div"
    attribute: "text"
    required: false

workflows:
  - action: "navigate"
    name: "open_amazon_search"
    params:
      url: "{base_url}/s?k={sku}"

  - action: "wait_for"
    name: "wait_for_search_results"
    params:
      selector:
        - "div.s-main-slot"
        - "[data-component-type='s-search-result']"
      timeout: 20

  - action: "click"
    name: "open_first_non_sponsored_result"
    params:
      selector: "div.s-main-slot [data-component-type='s-search-result'] h2 a"
      index: 0
      wait_after: 1.5

  - action: "wait_for"
    name: "wait_for_product_title"
    params:
      selector: "#productTitle"
      timeout: 20

  - action: "extract"
    name: "extract_amazon_fields"
    params:
      fields:
        - "name"
        - "brand"
        - "price"
        - "description"
        - "images"
        - "availability"
        - "asin"
        - "weight"

  - action: "check_no_results"
    name: "check_for_no_results"

test_skus:
  - "035585499741"
  - "079105116708"
  - "029695285400"

fake_skus:
  - "xyzabc123notexist456"
  - "B00ZZZZZZZ"
  - "NOTAPRODUCT"

edge_case_skus:
  - "A1"
  - "ABCDEFGHIJKLMNOPQRSTUVWXYZ"

timeout: 60
retries: 0

anti_detection:
  enable_captcha_detection: true
  enable_rate_limiting: true
  enable_human_simulation: true
  enable_session_rotation: true
  enable_blocking_handling: true
  rate_limit_min_delay: 2.0
  rate_limit_max_delay: 6.0
  session_rotation_interval: 25
  max_retries_on_detection: 2

validation:
  no_results_selectors:
    - ".s-no-results-filler"
    - "#noResultsTitle"
  no_results_text_patterns:
    - "no results for"
    - "0 results"
