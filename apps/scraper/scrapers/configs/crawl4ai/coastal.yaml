name: "coastal"
display_name: "Crawl4AI Coastal Pet Product Extractor"
base_url: "https://www.coastalpet.com"
scraper_type: "static"
schema_version: "1.0"

selectors:
  - name: "name"
    selector: "h1.product-detail__title"
    attribute: "text"
    required: true

  - name: "brand"
    selector: ".product-detail__vendor"
    attribute: "text"
    required: false

  - name: "size_options"
    selector: ".product-variant-selector__option"
    attribute: "text"
    multiple: true
    required: false

  - name: "description"
    selector: ".product-detail__description"
    attribute: "text"
    required: false

  - name: "images"
    selector: ".product-detail__gallery img"
    attribute: "src"
    multiple: true
    required: false

  - name: "price"
    selector: ".product-detail__price"
    attribute: "text"
    required: false

  - name: "upc"
    selector: ".product-specs"
    attribute: "text"
    required: false

  - name: "item_number"
    selector: ".product-specs"
    attribute: "text"
    required: false

workflows:
  - action: "navigate"
    name: "open_coastal_search"
    params:
      url: "{base_url}/products/search/?q={sku}"

  - action: "wait_for"
    name: "wait_for_search_results"
    params:
      selector:
        - "a.product-listing__title.product-listing__link"
        - "main"
      timeout: 20

  - action: "conditional_click"
    name: "accept_cookie_banner_if_present"
    params:
      selector: "button#onetrust-accept-btn-handler, button:has-text('Accept')"
      timeout: 2

  - action: "click"
    name: "open_first_result"
    params:
      selector: "a.product-listing__title.product-listing__link"
      index: 0
      wait_after: 1.5

  - action: "wait_for"
    name: "wait_for_product_content"
    params:
      selector:
        - "h1.product-detail__title"
        - ".product-detail"
      timeout: 20

  - action: "extract"
    name: "extract_coastal_fields"
    params:
      fields:
        - "name"
        - "brand"
        - "size_options"
        - "description"
        - "images"
        - "price"
        - "upc"
        - "item_number"

  - action: "check_no_results"
    name: "check_for_no_results"

test_skus:
  - "879213007157"

fake_skus:
  - "xyzabc123notexist456"
  - "ZZZZZ"
  - "00000"

edge_case_skus:
  - "A"
  - "ABCDEFGHIJ123456"

timeout: 60
retries: 0

anti_detection:
  enable_captcha_detection: false
  enable_rate_limiting: true
  enable_human_simulation: true
  enable_session_rotation: false
  enable_blocking_handling: false
  rate_limit_min_delay: 2.0
  rate_limit_max_delay: 4.0
  session_rotation_interval: 30
  max_retries_on_detection: 2

validation:
  no_results_selectors:
    - "h3:has-text('Search')"
  no_results_text_patterns:
    - "Your search returned no results"
    - "0 Products Found"
