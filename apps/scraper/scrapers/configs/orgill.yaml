schema_version: "1.0"
name: orgill
requires_login: true
display_name: Orgill
base_url: https://www.orgill.com
scraper_type: static
selectors:
  - name: Name
    selector: "#cphMainContent_ctl00_lblDescription"
    attribute: text
    multiple: false
    required: true
    fallback_selectors:
      - "h1"
      - "[data-product-name]"
  - name: Brand
    selector: "#cphMainContent_ctl00_lblVendorName"
    attribute: text
    multiple: false
    required: false
  - name: model_number
    selector: "#cphMainContent_ctl00_lblModelNumber"
    attribute: text
    multiple: false
    required: false
  - name: Weight
    selector: //strong[contains(text(),'Weight(lb):')]/parent::div/following-sibling::div
    attribute: text
    multiple: false
    required: false
  - name: Image URLs
    selector: "#multipleImagesCarousel img[src*='orgill.com'], img[id*='imgProductDetail'][src*='orgill.com']"
    attribute: src
    multiple: true
    required: false
    fallback_selectors:
      - "img[id*='imgProductDetail']"
      - "#multipleImagesCarousel img"
  - name: UPC
    selector: "#cphMainContent_ctl00_lblUPCCode"
    attribute: text
    multiple: false
    required: false
    fallback_selectors:
      - "//strong[contains(text(),'UPC')]/parent::div/following-sibling::div"
  - name: Description
    selector: "#cphMainContent_ctl00_lblLongDescription, #cphMainContent_ctl00_lblShortDescription"
    attribute: text
    multiple: false
    required: false
    fallback_selectors:
      - ".product-description"
      - "#productDescriptionDiv"
  - name: Dimensions
    selector: "//strong[contains(text(),'Dimension')]/parent::div/following-sibling::div"
    attribute: text
    multiple: false
    required: false
  - name: Features
    selector: "#cphMainContent_ctl00_lblFeatures li, #cphMainContent_ctl00_lblFeatures"
    attribute: text
    multiple: true
    required: false
    fallback_selectors:
      - ".product-features li"
      - "#featuresDiv li"
  - name: Category
    selector: "#cphMainContent_ctl00_lblDepartment"
    attribute: text
    multiple: false
    required: false
    fallback_selectors:
      - ".breadcrumb li:last-child a"
workflows:
  - action: login
    name: null
    params: {}
  - action: navigate
    name: null
    params:
      url: https://www.orgill.com/SearchResultN.aspx?ddlhQ={sku}
  - action: wait
    name: null
    params:
      seconds: 5
  - action: wait_for
    name: null
    params:
      timeout: 10
      selector:
        - "#cphMainContent_ctl00_lblDescription"
        - "#cphMainContent_ctl00_lblErrorMessage"
        - "#cphMainContent_ctl00_lblSearchSubHeader"
        - //span[contains(text(), 'Found 0 results')]
        - .no-results
  - action: wait
    name: null
    params:
      seconds: 3
  - action: check_no_results
    name: null
    params: {}
  - action: conditional_skip
    name: null
    params:
      if_flag: no_results_found
  - action: validate_search_result
    name: null
    params:
      required_selectors:
        - "#cphMainContent_ctl00_lblDescription"
        - "h1"
        - ".product-detail"
  - action: click
    name: null
    params:
      selector: //a[div[contains(text(), 'Ordering Specifications')]]
  - action: wait_for
    name: null
    params:
      timeout: 10
      selector: "#orderSpecificationDiv"
  - action: extract
    name: null
    params:
      fields:
        - Name
        - Brand
        - model_number
        - Weight
        - Image URLs
        - UPC
        - Description
        - Dimensions
        - Features
        - Category
  - action: process_images
    name: null
    params:
      field: Image URLs
      quality_patterns:
        - regex: "/websmall/"
          replacement: "/web/"
        - regex: "_thumb\\."
          replacement: "."
      filters:
        - type: require_text
          text: orgill.com
        - type: exclude_text
          text: spacer
        - type: exclude_text
          text: noimage
        - type: exclude_text
          text: placeholder
      deduplicate: true
ai_config: null
anti_detection:
  enable_rate_limiting: false
  rate_limit_max_delay: 3
  rate_limit_min_delay: 1
  enable_human_simulation: false
  enable_session_rotation: false
  enable_blocking_handling: false
  enable_captcha_detection: false
  max_retries_on_detection: 3
  session_rotation_interval: 100
validation:
  no_results_selectors:
    - //span[contains(text(), 'Found 0 results')]
    - "#cphMainContent_ctl00_lblErrorMessage"
    - .no-results
    - .empty-search
    - .search-no-results
  no_results_text_patterns:
    - no results found
    - no products found
    - your search returned no results
    - we couldn't find any results
    - no items match your search
    - Found 0 results
    - did not return any results
login:
  url: https://www.orgill.com/index.aspx?tab=8
  timeout: 60
  submit_button: "#cphMainContent_ctl00_loginOrgillxs_LoginButton"
  password_field: "#cphMainContent_ctl00_loginOrgillxs_Password"
  username_field: "#cphMainContent_ctl00_loginOrgillxs_UserName"
  success_indicator: "#btnMyProfile"
  failure_indicators:
    selectors:
      - "#cphMainContent_ctl00_loginOrgillxs_FailureText"
      - ".validation-summary-errors"
      - ".login-error"
    texts:
      - invalid username or password
      - login was unsuccessful
      - the username or password provided is incorrect
    url_contains:
      - index.aspx?tab=8
http_status: null
normalization: null
timeout: 30
retries: 2
image_quality: 40
credential_refs:
  - orgill
test_skus:
  - "037193347322"
  - "032700006105"
  - "073091023005"
  - "027773008934"
  - "032886595189"
  - "071859975047"
fake_skus:
  - zzzzqqqq9999xxxx
  - "000000000000"
  - "999999999999"
edge_case_skus:
  - "123"
  - "1234567890123456789"
