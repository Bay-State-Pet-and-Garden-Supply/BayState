schema_version: "1.0"
name: amazon
display_name: Amazon
base_url: https://www.amazon.com
scraper_type: static
selectors:
  - name: Name
    selector: "#productTitle"
    attribute: text
    multiple: false
    required: true
  - name: Brand
    selector: "#bylineInfo"
    attribute: text
    multiple: false
    required: true
  - name: Image URLs
    selector: "#altImages li.imageThumbnail img"
    attribute: src
    multiple: true
    required: true
  - name: Weight
    selector: "//tr[.//th[contains(., 'Weight')]] | //li[contains(., 'ounces')] | //li[contains(., 'pounds')]"
    attribute: text
    multiple: false
    required: false
  - name: Rating
    selector: "#acrPopover, i[data-hook='average-star-rating'] span"
    attribute: text
    multiple: false
    required: false
  - name: Reviews
    selector: "#acrCustomerReviewText"
    attribute: text
    multiple: false
    required: false
  - name: Description
    selector: "#productDescription"
    attribute: text
    multiple: false
    required: false
  - name: Features
    selector: "#feature-bullets li span"
    attribute: text
    multiple: true
    required: false
  - name: Availability
    selector: "#availability"
    attribute: text
    multiple: false
    required: false
  - name: ASIN
    selector: "div#detailBullets_feature_div li:has(span:has-text('ASIN')) span + span, tr:has(th:has-text('ASIN')) td"
    attribute: text
    multiple: false
    required: false
  - name: Technical Specs
    selector: "#prodDetails, #detailBullets_feature_div"
    attribute: text
    multiple: false
    required: false
workflows:
  - action: navigate
    name: null
    params:
      url: https://www.amazon.com/s?k={{sku}}
  - action: wait
    name: wait_for_load
    params:
      duration: 3
  - action: conditional_click
    name: accept_cookies
    params:
      selector: "#sp-cc-accept, .a-button-input[data-value='accept']"
  - action: wait_for
    name: null
    params:
      timeout: 30
      selector:
        - "#productTitle"
        - "div[data-asin]:not([data-asin=''])"
        - ".s-result-item"
        - "#noResultsTitle"
  - action: check_no_results
    name: null
    params: {}
  - action: conditional_skip
    name: null
    params:
      if_flag: no_results_found
  - action: validate_search_result
    name: null
    params:
      required_selectors:
        - "#productTitle"
      search_result_selector: "div[data-component-type='s-search-result']:not(.AdHolder) h2 a"
  - action: conditional
    name: skip_search_if_on_pdp
    params:
      condition:
        action: wait_for
        params:
          timeout: 2
          selector: "#productTitle"
      if_true:
        action: conditional_skip
        params:
          if_flag: true
  - action: click
    name: click_first_result
    params:
      index: 0
      selector: "div[data-component-type='s-search-result']:not(.AdHolder) h2 a"
      force: true
      timeout: 10
  - action: wait_for
    name: wait_for_pdp
    params:
      timeout: 10
      selector:
        - "#productTitle"
        - "#title"
  - action: extract_and_transform
    name: null
    params:
      fields:
        - name: Name
          selector: "#productTitle"
          attribute: text
        - name: Brand
          selector: "#bylineInfo"
          attribute: text
          transform:
            - type: regex_extract
              group: 1
              pattern: Visit the (.+) Store
        - name: Images
          multiple: true
          selector: "#altImages li.imageThumbnail img"
          attribute: src
          transform:
            - type: replace
              pattern: _AC_US40_
              replacement: _AC_SL1500_
        - name: Weight
          required: false
          selector: "tr:has-text('Item Weight') td, li:has-text('Item Weight') span, div#detailBullets_feature_div li:has-text('Item Weight') span.a-list-item, //tr[.//th[contains(., 'Weight')]] | //li[contains(., 'ounces')] | //li[contains(., 'pounds')]"
          attribute: text
        - name: Rating
          selector: "span.a-icon-alt"
          multiple: true
          attribute: text
        - name: Reviews
          selector: "span#acrCustomerReviewText, a.a-link-normal span#acrCustomerReviewText"
          attribute: text
        - name: Description
          selector: "div#feature-bullets, div#productDescription, div#aplus"
          attribute: text
        - name: Features
          multiple: true
          selector: "#feature-bullets li span"
          attribute: text
        - name: Availability
          selector: "#availability"
          attribute: text
        - name: ASIN
          selector: "tr:has-text('ASIN') td, li:has-text('ASIN') span, div#detailBullets_feature_div li:has-text('ASIN') span.a-list-item"
          attribute: text
        - name: Technical Specs
          selector: "div#prodDetails, div#detailBullets_feature_div"
          attribute: text
ai_config: null
anti_detection:
  enable_rate_limiting: false
  rate_limit_max_delay: 3
  rate_limit_min_delay: 1
  enable_human_simulation: false
  enable_session_rotation: false
  enable_blocking_handling: false
  enable_captcha_detection: false
  max_retries_on_detection: 3
  session_rotation_interval: 100
validation:
  no_results_selectors:
    - "[widgetId='messaging-messages-no-results']"
    - .s-no-results-filler
    - "#noResultsTitle"
    - .s-desktop-no-results
    - //h2[contains(text(), 'No results for your search query')]
  no_results_text_patterns:
    - no results for
    - 0 results for
    - No results for your search query
    - Try checking your spelling
login: null
http_status: null
normalization: null
timeout: 30
retries: 2
image_quality: 100
test_skus:
  - "035585499741"
  - "079105116708"
  - "029695285400"
  - "038100174642"
  - "017800149495"
  - 852Icons4
  - B08N5WRWNW
fake_skus:
  - xyzabc123notexist456
  - B00ZZZZZZZ
  - NOTAPRODUCT
edge_case_skus:
  - A1
  - ABCDEFGHIJKLMNOPQRSTUVWXYZ
