# AI Scraper Config: Pet Food Experts
# Migrated from legacy static scraper to Crawl4AI
# NOTE: Requires login - manual review needed for authentication handling
name: "ai-petfoodex"
display_name: "AI Pet Food Experts Extractor"
base_url: "https://www.petfoodexperts.com"
scraper_type: "agentic"

ai_config:
  provider: "crawl4ai"
  task: "Find Pet Food Experts products by item number and extract product name, brand, weight, attributes, and images. Navigate through search results and handle login if required."
  max_steps: 14
  confidence_threshold: 0.75
  llm_model: "gpt-4o-mini"
  use_vision: true
  headless: true

workflows:
  - action: "navigate"
    name: "search_petfoodex_for_sku"
    params:
      url: "https://orders.petfoodexperts.com/Search?query={sku}"

  - action: "ai_extract"
    name: "extract_petfoodex_product"
    params:
      task: "Search for and extract Pet Food Experts product information including Name, Brand, Weight, Attributes, and Images. Handle login page if encountered. Parse product specifications from attributes."
      visit_top_n: 2
      max_steps: 16
      confidence_threshold: 0.75
      schema:
        name: str
        brand: str
        weight: str
        attributes: str
        images: list
        specifications: str

  - action: "ai_validate"
    name: "validate_petfoodex_extraction"
    params:
      required_fields:
        - name
        - brand
        - images
      sku_must_match: false
      min_confidence: 0.7

test_skus:
  - "33011808"
  - "10158320"
  - "10132100"
  - "10012345"
  - "20456789"
  - "30987654"

fake_skus:
  - "xyzabc123notexist456"
  - "00000000"
  - "99999999"

edge_case_skus:
  - "1"
  - "1234567890123"

timeout: 60
retries: 0

anti_detection:
  enable_captcha_detection: true
  enable_rate_limiting: true
  enable_human_simulation: true
  enable_session_rotation: false
  enable_blocking_handling: true
  rate_limit_min_delay: 1.0
  rate_limit_max_delay: 3.0
  session_rotation_interval: 50
  max_retries_on_detection: 2

validation:
  no_results_selectors:
    - "h2:has-text('0 item')"
    - "h2:has-text('0 items')"
    - ".no-results"
  no_results_text_patterns:
    - "0 items"
    - "no results"

# NOTE: This scraper requires authentication.
# The legacy config had login credentials that need to be migrated separately.
needs_manual_review: true
review_reason: "Requires login authentication handling"
