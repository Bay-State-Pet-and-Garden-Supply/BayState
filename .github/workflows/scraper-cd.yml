name: Scraper CD

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even without scraper changes'
        required: false
        default: false
        type: boolean
  push:
    branches: [main, master, develop, dev]
    tags: ["v*"]
    paths:
      - 'apps/scraper/**'
      - '.github/workflows/scraper-cd.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: scraper

jobs:
  changes:
    name: Detect scraper changes
    runs-on: ubuntu-latest
    outputs:
      scraper: ${{ steps.filter.outputs.scraper }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            scraper:
              - 'apps/scraper/**'
              - '.github/workflows/scraper-cd.yml'

  build:
    name: Build Docker Image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: changes
    if: needs.changes.outputs.scraper == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_build)
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: [self-hosted, Linux, X64]
            platform: linux/amd64
          - runner: [self-hosted, Linux, ARM64]
            platform: linux/arm64
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare IMAGE_NAME
        run: |
          echo "IMAGE_NAME=$(echo ${{ github.repository }}/${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Prepare platform env
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/dev' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./apps/scraper
          file: ./apps/scraper/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=build-${{ env.PLATFORM_PAIR }}
          build-args: |
            RUNNER_BUILD_ID=${{ github.run_id }}-${{ github.run_attempt }}
            RUNNER_BUILD_SHA=${{ github.sha }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge Manifests & Publish
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.scraper == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_build)
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4

      - name: Prepare IMAGE_NAME
        run: |
          echo "IMAGE_NAME=$(echo ${{ github.repository }}/${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/dev' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}

      - name: Create manifest list and push
        id: merge
        run: |
          tags=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          
          digests=""
          for f in /tmp/digests/*; do
            digest_sha=$(basename "$f")
            digests="$digests ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:$digest_sha"
          done
          
          docker buildx imagetools create $tags $digests
          
          DIGEST=$(docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }} --format '{{.Manifest.Digest}}')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        if: contains(steps.meta.outputs.tags, ':latest')
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Publish latest runner release metadata
        if: contains(steps.meta.outputs.tags, ':latest')
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RUNNER_RELEASE_CHANNEL: latest
          RUNNER_BUILD_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          RUNNER_BUILD_SHA: ${{ github.sha }}
          RUNNER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          RUNNER_IMAGE_DIGEST: ${{ steps.merge.outputs.digest }}
        run: node scripts/publish-scraper-runner-release.mjs

