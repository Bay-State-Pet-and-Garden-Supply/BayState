name: Web CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"
  push:
    branches: [develop, main]
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"

jobs:
  test:
    name: Test & Lint
    runs-on: [self-hosted, linux]
    defaults:
      run:
        working-directory: ./apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linter
        run: bun run lint

      - name: Run tests
        run: bun run test
        env:
          CI: true

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run tsc --noEmit || true
