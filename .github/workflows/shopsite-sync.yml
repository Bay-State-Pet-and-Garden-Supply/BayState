name: ShopSite Sync

permissions:
  contents: read

on:
  schedule:
    - cron: '0 2 * * 0,4-6' # Run nightly at 2 AM from Thursday through Sunday
  workflow_dispatch:
    inputs:
      target:
        description: 'What to sync'
        required: false
        type: choice
        options:
          - all
          - products
          - orders
        default: all
      limit:
        description: 'Maximum number of items to sync (applies to both if target is "all")'
        required: false
        type: string
        default: '500'
      start_date:
        description: 'Start date for order sync (mm/dd/yyyy)'
        required: false
        type: string

concurrency:
  group: shopsite-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync ShopSite Data
    environment: register-sync
    runs-on: [self-hosted, Windows, X64, register-sync]
    timeout-minutes: 60
    defaults:
      run:
        shell: pwsh
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun (Manual)
        run: |
          $version = "1.3.5"
          $url = "https://github.com/oven-sh/bun/releases/download/bun-v$version/bun-windows-x64.zip"
          $zipPath = "$HOME\bun.zip"
          $extractPath = "$HOME\bun-bin"
          
          Write-Host "Downloading Bun v$version..."
          curl.exe -L -o $zipPath $url
          
          Write-Host "Extracting Bun..."
          if (Test-Path $extractPath) { Remove-Item -Recurse -Force $extractPath }
          New-Item -ItemType Directory -Path $extractPath -Force | Out-Null
          tar.exe -xf $zipPath -C $extractPath
          
          $bunExeDir = Get-ChildItem -Path $extractPath -Filter "bun-windows-x64" -Directory | Select-Object -First 1
          if ($null -eq $bunExeDir) { $bunExeDir = $extractPath } else { $bunExeDir = $bunExeDir.FullName }
          
          Write-Host "Adding $bunExeDir to GITHUB_PATH..."
          echo "$bunExeDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          
          Remove-Item $zipPath
        shell: pwsh

      - name: Install dependencies
        run: bun install --frozen-lockfile --silent
        env:
          CI: true

      - name: Run syncs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SHOPSITE_URL: ${{ secrets.SHOPSITE_URL }}
          SHOPSITE_MERCHANT_ID: ${{ secrets.SHOPSITE_MERCHANT_ID }}
          SHOPSITE_PASSWORD: ${{ secrets.SHOPSITE_PASSWORD }}
        run: |
          $target = "${{ github.event.inputs.target }}"
          if ([string]::IsNullOrWhiteSpace($target)) {
            $target = "all"
          }

          $limitArgs = @()
          if ("${{ github.event.inputs.limit }}" -ne "") {
            $limitArgs += "--limit=${{ github.event.inputs.limit }}"
          }

          $orderArgs = @($limitArgs)
          if ("${{ github.event.inputs.start_date }}" -ne "") {
            $orderArgs += "--start-date=${{ github.event.inputs.start_date }}"
          }

          $success = $true

          if ($target -eq "all" -or $target -eq "products") {
            Write-Host "=== Syncing ShopSite Products ==="
            try {
              & bun run sync:shopsite @limitArgs
              if ($LASTEXITCODE -ne 0) {
                Write-Host "::error::Product sync failed with exit code $LASTEXITCODE"
                $success = $false
              }
            } catch {
              Write-Host "::error::Product sync threw an exception: $_"
              $success = $false
            }
          }

          if ($target -eq "all" -or $target -eq "orders") {
            Write-Host "=== Syncing ShopSite Orders ==="
            try {
              & bun run sync:orders @orderArgs
              if ($LASTEXITCODE -ne 0) {
                Write-Host "::error::Order sync failed with exit code $LASTEXITCODE"
                $success = $false
              }
            } catch {
              Write-Host "::error::Order sync threw an exception: $_"
              $success = $false
            }
          }

          if (-not $success) {
            exit 1
          }
