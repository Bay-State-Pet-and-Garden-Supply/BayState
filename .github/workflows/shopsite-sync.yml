name: ShopSite Sync

on:
  workflow_dispatch:
    inputs:
      limit:
        description: Optional limit for testing
        required: false
        type: string
  schedule:
    - cron: '0 5 * * *'

concurrency:
  group: shopsite-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync ShopSite products
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ./

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ShopSite sync
        run: |
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            bun --cwd apps/web run sync:shopsite --limit=${{ github.event.inputs.limit }}
          else
            bun --cwd apps/web run sync:shopsite
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
