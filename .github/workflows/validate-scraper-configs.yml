name: Validate Scraper Configs

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/scraper/scrapers/configs/**/*.yml"
      - "apps/scraper/scrapers/configs/**/*.yaml"

jobs:
  validate:
    name: Validate YAML scraper configs
    runs-on: [self-hosted, linux]
    defaults:
      run:
        working-directory: ./apps/scraper

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "./apps/scraper/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate scraper configs
        run: |
          python scripts/validate_configs.py
