name: Register Sync

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      source:
        description: Source to use for the sync
        required: false
        type: choice
        options:
          - odbc
          - workbook
        default: odbc
      file_path:
        description: Optional absolute or repo-relative workbook path on the local runner when source=workbook
        required: false
        type: string
      file_glob:
        description: Optional wildcard used to pick the newest workbook on the local runner when source=workbook
        required: false
        type: string
      apply_changes:
        description: Apply updates to Supabase instead of running a preview
        required: false
        type: boolean
        default: false
      sync_price:
        description: Also sync LIST_PRICE into products.price
        required: false
        type: boolean
        default: false

concurrency:
  group: register-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync register inventory
    environment: register-sync
    runs-on: [self-hosted, Windows, X64, register-sync]
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh
        working-directory: .

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Setup Bun (Manual)
        run: |
          $version = "1.3.5"
          $url = "https://github.com/oven-sh/bun/releases/download/bun-v$version/bun-windows-x64.zip"
          $zipPath = "$HOME\bun.zip"
          $extractPath = "$HOME\bun-bin"
          
          Write-Host "Downloading Bun v$version..."
          curl.exe -L -o $zipPath $url
          
          Write-Host "Extracting Bun..."
          if (Test-Path $extractPath) { Remove-Item -Recurse -Force $extractPath }
          New-Item -ItemType Directory -Path $extractPath -Force | Out-Null
          tar.exe -xf $zipPath -C $extractPath
          
          $bunExeDir = Get-ChildItem -Path $extractPath -Filter "bun-windows-x64" -Directory | Select-Object -First 1
          if ($null -eq $bunExeDir) { $bunExeDir = $extractPath } else { $bunExeDir = $bunExeDir.FullName }
          
          Write-Host "Adding $bunExeDir to GITHUB_PATH..."
          echo "$bunExeDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          
          Remove-Item $zipPath
        shell: pwsh

      - name: Install dependencies
        run: |
          # Clear potentially corrupted node_modules from previous runs since checkout clean: false
          if (Test-Path "node_modules") { 
            Write-Host "Cleaning existing node_modules..."
            Remove-Item -Recurse -Force node_modules 
          }
          bun pm cache rm
          bun install --frozen-lockfile --verbose
        env:
          CI: true

      - name: Run register sync
        env:
          GITHUB_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          GITHUB_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_REGISTER_SYNC_SOURCE: ${{ vars.REGISTER_SYNC_SOURCE }}
          GITHUB_REGISTER_SYNC_FILE_PATH: ${{ vars.REGISTER_SYNC_FILE_PATH }}
          GITHUB_REGISTER_SYNC_FILE_GLOB: ${{ vars.REGISTER_SYNC_FILE_GLOB }}
          GITHUB_REGISTER_SYNC_FIELDS: ${{ vars.REGISTER_SYNC_FIELDS }}
          GITHUB_REGISTER_ODBC_CONNECTION_STRING: ${{ secrets.REGISTER_ODBC_CONNECTION_STRING }}
          GITHUB_REGISTER_ODBC_DSN: ${{ vars.REGISTER_ODBC_DSN }}
          GITHUB_REGISTER_ODBC_DRIVER: ${{ vars.REGISTER_ODBC_DRIVER }}
          GITHUB_REGISTER_ODBC_SERVER: ${{ vars.REGISTER_ODBC_SERVER }}
          GITHUB_REGISTER_ODBC_PORT: ${{ vars.REGISTER_ODBC_PORT }}
          GITHUB_REGISTER_ODBC_SSL_PORT: ${{ vars.REGISTER_ODBC_SSL_PORT }}
          GITHUB_REGISTER_ODBC_TIMEOUT_SECONDS: ${{ vars.REGISTER_ODBC_TIMEOUT_SECONDS }}
          GITHUB_REGISTER_ODBC_COMMAND_TIMEOUT_SECONDS: ${{ vars.REGISTER_ODBC_COMMAND_TIMEOUT_SECONDS }}
          GITHUB_REGISTER_ODBC_UID: ${{ secrets.REGISTER_ODBC_UID }}
          GITHUB_REGISTER_ODBC_PWD: ${{ secrets.REGISTER_ODBC_PWD }}
        run: |
          function Get-RunnerEnvValue {
            param([string]$Name)

            foreach ($scope in @(
              [System.EnvironmentVariableTarget]::Process,
              [System.EnvironmentVariableTarget]::User,
              [System.EnvironmentVariableTarget]::Machine
            )) {
              $value = [Environment]::GetEnvironmentVariable($Name, $scope)
              if (-not [string]::IsNullOrWhiteSpace($value)) {
                return $value.Trim()
              }
            }

            return $null
          }

          function Set-ResolvedEnvValue {
            param(
              [string]$Name,
              [string]$WorkflowValue,
              [bool]$Mask = $false
            )

            $resolvedValue = $WorkflowValue
            if ([string]::IsNullOrWhiteSpace($resolvedValue)) {
              $resolvedValue = Get-RunnerEnvValue -Name $Name
            }

            if ([string]::IsNullOrWhiteSpace($resolvedValue)) {
              return $false
            }

            if ($Mask) {
              Write-Host "::add-mask::$resolvedValue"
            }

            [Environment]::SetEnvironmentVariable($Name, $resolvedValue, [System.EnvironmentVariableTarget]::Process)
            return $true
          }

          function Use-DefaultRegisterDsn {
            $defaultDsn = 'integra.udd'

            try {
              $null = Get-OdbcDsn -Name $defaultDsn -ErrorAction Stop
              [Environment]::SetEnvironmentVariable('REGISTER_ODBC_DSN', $defaultDsn, [System.EnvironmentVariableTarget]::Process)
              return $true
            } catch {
              return $false
            }
          }

          $hasSupabaseUrl = Set-ResolvedEnvValue -Name 'SUPABASE_URL' -WorkflowValue $env:GITHUB_SUPABASE_URL -Mask $true
          $hasSupabaseServiceRoleKey = Set-ResolvedEnvValue -Name 'SUPABASE_SERVICE_ROLE_KEY' -WorkflowValue $env:GITHUB_SUPABASE_SERVICE_ROLE_KEY -Mask $true

          if (-not $hasSupabaseUrl -or -not $hasSupabaseServiceRoleKey) {
            throw 'Missing Supabase configuration. Set SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY in the register-sync GitHub environment or on the labeled runner machine.'
          }

          $hasConnectionString = Set-ResolvedEnvValue -Name 'REGISTER_ODBC_CONNECTION_STRING' -WorkflowValue $env:GITHUB_REGISTER_ODBC_CONNECTION_STRING -Mask $true
          $hasDsn = Set-ResolvedEnvValue -Name 'REGISTER_ODBC_DSN' -WorkflowValue $env:GITHUB_REGISTER_ODBC_DSN
          $hasDriver = Set-ResolvedEnvValue -Name 'REGISTER_ODBC_DRIVER' -WorkflowValue $env:GITHUB_REGISTER_ODBC_DRIVER
          $hasServer = Set-ResolvedEnvValue -Name 'REGISTER_ODBC_SERVER' -WorkflowValue $env:GITHUB_REGISTER_ODBC_SERVER

          Set-ResolvedEnvValue -Name 'REGISTER_SYNC_SOURCE' -WorkflowValue $env:GITHUB_REGISTER_SYNC_SOURCE | Out-Null
          Set-ResolvedEnvValue -Name 'REGISTER_SYNC_FILE_PATH' -WorkflowValue $env:GITHUB_REGISTER_SYNC_FILE_PATH | Out-Null
          Set-ResolvedEnvValue -Name 'REGISTER_SYNC_FILE_GLOB' -WorkflowValue $env:GITHUB_REGISTER_SYNC_FILE_GLOB | Out-Null
          Set-ResolvedEnvValue -Name 'REGISTER_SYNC_FIELDS' -WorkflowValue $env:GITHUB_REGISTER_SYNC_FIELDS | Out-Null
          Set-ResolvedEnvValue -Name 'REGISTER_ODBC_PORT' -WorkflowValue $env:GITHUB_REGISTER_ODBC_PORT | Out-Null
          Set-ResolvedEnvValue -Name 'REGISTER_ODBC_SSL_PORT' -WorkflowValue $env:GITHUB_REGISTER_ODBC_SSL_PORT | Out-Null
          Set-ResolvedEnvValue -Name 'REGISTER_ODBC_TIMEOUT_SECONDS' -WorkflowValue $env:GITHUB_REGISTER_ODBC_TIMEOUT_SECONDS | Out-Null
          Set-ResolvedEnvValue -Name 'REGISTER_ODBC_COMMAND_TIMEOUT_SECONDS' -WorkflowValue $env:GITHUB_REGISTER_ODBC_COMMAND_TIMEOUT_SECONDS | Out-Null
          Set-ResolvedEnvValue -Name 'REGISTER_ODBC_UID' -WorkflowValue $env:GITHUB_REGISTER_ODBC_UID -Mask $true | Out-Null
          Set-ResolvedEnvValue -Name 'REGISTER_ODBC_PWD' -WorkflowValue $env:GITHUB_REGISTER_ODBC_PWD -Mask $true | Out-Null

          if (-not $hasConnectionString -and -not $hasDsn -and -not ($hasDriver -and $hasServer)) {
            $hasDsn = Use-DefaultRegisterDsn
          }

          if (-not $hasConnectionString -and -not $hasDsn -and -not ($hasDriver -and $hasServer)) {
            throw 'Missing register ODBC configuration. Define REGISTER_ODBC_CONNECTION_STRING (preferred), REGISTER_ODBC_DSN, or REGISTER_ODBC_DRIVER with REGISTER_ODBC_SERVER in the register-sync GitHub environment or on the labeled runner machine.'
          }

          $scriptArgs = @()

          $source = "${{ github.event.inputs.source }}"
          if ([string]::IsNullOrWhiteSpace($source)) {
            $source = $env:REGISTER_SYNC_SOURCE
          }
          if ([string]::IsNullOrWhiteSpace($source)) {
            $source = "odbc"
          }
          $scriptArgs += "--source=$source"

          $filePath = "${{ github.event.inputs.file_path }}"
          if (-not [string]::IsNullOrWhiteSpace($filePath)) {
            $scriptArgs += "--file=$filePath"
          }

          $fileGlob = "${{ github.event.inputs.file_glob }}"
          if (-not [string]::IsNullOrWhiteSpace($fileGlob)) {
            $scriptArgs += "--file-glob=$fileGlob"
          }

          $fields = $env:REGISTER_SYNC_FIELDS
          if ([string]::IsNullOrWhiteSpace($fields)) {
            $fields = "quantity,stock_status"
            if ("${{ github.event.inputs.sync_price }}" -eq "true") {
              $fields = "quantity,stock_status,price"
            }
          }
          $scriptArgs += "--fields=$fields"

          $applyChanges = $false
          if ("${{ github.event_name }}" -eq "schedule") {
            $applyChanges = $true
          } elseif ("${{ github.event.inputs.apply_changes }}" -eq "true") {
            $applyChanges = $true
          }

          if ($applyChanges) {
            $scriptArgs += "--apply"
          } else {
            $scriptArgs += "--dry-run"
          }

          Set-Location apps\web
          & bun run sync:register @scriptArgs
